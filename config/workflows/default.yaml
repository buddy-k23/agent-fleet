name: "Full Development Pipeline"
concurrency: 1
max_cost_usd: 50.0
classifier_mode: suggest
stages:
  - name: plan
    agent: architect
    model: anthropic/claude-haiku-4-5-20251001
    gate:
      type: approval

  - name: backend
    agent: backend-dev
    model: anthropic/claude-haiku-4-5-20251001
    depends_on: plan
    gate:
      type: automated
      checks:
        - tests_pass

  - name: frontend
    agent: frontend-dev
    model: anthropic/claude-haiku-4-5-20251001
    depends_on: plan
    gate:
      type: automated
      checks:
        - tests_pass

  - name: review
    agent: reviewer
    model: anthropic/claude-haiku-4-5-20251001
    depends_on:
      - backend
      - frontend
    gate:
      type: score
      min_score: 80
      on_fail: route_to
      max_retries: 2

  - name: e2e
    agent: tester
    model: anthropic/claude-haiku-4-5-20251001
    depends_on: review
    gate:
      type: automated
      checks:
        - tests_pass

  - name: deliver
    agent: integrator
    depends_on: e2e
    gate:
      type: approval
