name: "Two-Stage Proof of Concept"
concurrency: 1
max_cost_usd: 5.0
classifier_mode: disabled
stages:
  - name: plan
    agent: architect
    model: anthropic/claude-haiku-4-5-20251001
    gate:
      type: approval

  - name: backend
    agent: backend-dev
    model: anthropic/claude-haiku-4-5-20251001
    depends_on: plan
    gate:
      type: automated
      checks:
        - tests_pass
      max_retries: 2
