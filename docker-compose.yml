services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./fleet-ui
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL:-http://localhost:54321}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        VITE_API_BASE: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - backend

  worker:
    build: .
    command: python -m agent_fleet.worker
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-3}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-3}
    volumes:
      - ./config:/app/config
      - worker-worktrees:/tmp/fleet-worktrees
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "agent_fleet.worker", "--health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  worker-worktrees:
